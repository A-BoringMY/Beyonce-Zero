<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beyond Zero: Pro Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="endingOverlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:white; color:black; z-index:9999; flex-direction:column; justify-content:center; align-items:center; text-align:center;">
    <div style="width: 100%; max-width: 320px; padding: 20px;">
        <h1 style="font-size: 2.5rem; font-weight: 900; margin-bottom: 10px; color: black;">TAHNIAH!</h1>
        <p style="font-size: 1rem; color: #333; margin-bottom: 20px; line-height: 1.5;">Anda telah menamatkan Beyond Zero Pro Edition!</p>
        <div style="font-size: 5rem; margin: 20px 0;">🏆</div>
        <p style="font-size: 0.9rem; font-weight: bold; margin-bottom: 30px;">Seluruh alam semesta kini milik anda.</p>
        <button class="start-btn" onclick="closeEnding()" style="background: black; color: white; width: 100%; padding: 18px; border-radius: 50px; border: none; font-weight: bold; font-size: 1rem; cursor: pointer;">TERUSKAN BERMAIN</button>
    </div>
</div>

<!-- START OVERLAY -->
<div id="startOverlay">
    <div class="game-logo">Beyond Zero<span>PRO EDITION</span></div>
    
    <!-- Kotak Input Nama Awal -->
    <div id="nameInputSection">
        <input type="text" id="playerNameInput" placeholder="MASUKKAN NAMA ANDA" maxlength="12">
    </div>

    <button class="start-btn" id="mainStartBtn" onclick="startGame()">START GAME</button>
</div>

<div class="container" id="mainGame">
    <!-- Bahagian Rank & Edit Nama Inline -->
    <div id="rankTitle" style="font-size: 1.8rem; font-weight: 900; letter-spacing: 2px;">NOOB</div>
    <p id="displayPlayerName" style="margin: 5px 0; color: #00ecff; font-weight: bold; font-size: 0.8rem; cursor: pointer; opacity: 0.8;" onclick="changeNameInline()">
        PLAYER: <span id="nameText">HERO</span> ✏️
    </p>
    
    <div class="stats">
        <div>Clicks: <span id="clicks">0</span></div>
        <div>Diamonds: <span id="diamonds" style="color: #00ecff;">0</span></div>
        <div style="font-size: 0.8rem; color: #2ecc71; margin-top:5px;">Auto Speed: <span id="autoSpeed">0</span>/s</div>
        <div style="font-size: 0.7rem; opacity: 0.5;">Rebirths: <span id="rebirthCount">0</span> | Power: x<span id="clickPwr">1</span></div>
    </div>

    <button id="clickBtn" onclick="doClick(event)">CLICK!</button>

    <div class="section">
        <button class="rebirth-btn" id="rebirthBtn" onclick="doRebirth()">Rebirth (Kos: <span id="rebirthCost">100</span>)</button>
    </div>

    <div class="section">
        <h3 style="font-size:0.8rem; margin:0 0 10px 0; color:#00ecff; letter-spacing:1px;">AUTOMATION</h3>
        <div class="buy-selector" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px;">
            <label><input type="radio" name="buyAmt" value="1" checked onchange="updateUI()"> <span>x1</span></label>
            <label><input type="radio" name="buyAmt" value="1e2" onchange="updateUI()"> <span>x100</span></label>
            <label><input type="radio" name="buyAmt" value="1e5" onchange="updateUI()"> <span>x100k</span></label>
            <label><input type="radio" name="buyAmt" value="1e6" onchange="updateUI()"> <span>x1M</span></label>
            
            <label><input type="radio" name="buyAmt" value="1e9" onchange="updateUI()"> <span>x1B</span></label>
            <label><input type="radio" name="buyAmt" value="1e12" onchange="updateUI()"> <span>x1T</span></label>
            <label><input type="radio" name="buyAmt" value="1e15" onchange="updateUI()"> <span>x1Q</span></label>
            <label><input type="radio" name="buyAmt" value="1e18" onchange="updateUI()"> <span>x1Qi</span></label>
            
            <label><input type="radio" name="buyAmt" value="1e21" onchange="updateUI()"> <span>x1Sx</span></label>
            <label><input type="radio" name="buyAmt" value="1e24" onchange="updateUI()"> <span>x1Sp</span></label>
            <label><input type="radio" name="buyAmt" value="1e27" onchange="updateUI()"> <span>x1Oc</span></label>
            <label><input type="radio" name="buyAmt" value="1e30" onchange="updateUI()"> <span>x1No</span></label>
        </div>
        <button class="shop-btn" id="buyAuto" onclick="buyAuto()"><span>Auto Clicker</span> <span id="autoCostDisplay">1💎</span></button>
        <button class="shop-btn" id="buyFarm" onclick="buyFarm()" style="background: #2980b9; margin-top: 5px;"><span>Diamond Farm</span> <span id="farmCostDisplay">5💎</span></button>
    </div>

    <div class="section" style="background: #1e272e; border: 1px solid #f1c40f;">
        <h3 style="font-size:0.8rem; margin:0 0 10px 0; color:#f1c40f; letter-spacing:1px;">EQUIPMENT</h3>
        <button class="shop-btn" id="buySword" onclick="buyItem('sword', 50, 10)" style="background: #c0392b;"><span>Slayer Sword (+10)</span> <span>50💎</span></button>
        <button class="shop-btn" id="buyWand" onclick="buyItem('wand', 500, 100)" style="background: #8e44ad; margin-top: 5px;"><span>Magic Wand (+100)</span> <span>500💎</span></button>
        <button class="shop-btn" id="buyGlove" onclick="buyItem('glove', 2500, 0)" style="background: #e67e22; margin-top: 5px;"><span>Critical Glove (10% Crit)</span> <span>2.50k💎</span></button>
    </div>

    <div class="section" style="background: #111; border: 1px solid #00ecff; margin-top: 20px;">
        <h3 style="font-size:0.8rem; margin:0 0 10px 0; color:#00ecff; letter-spacing:1px;">GLOBAL LEADERBOARD</h3>
        <div id="leaderboard-list" style="text-align: left; font-size: 0.85rem; line-height: 1.6;"></div>
    </div>

    <div style="margin-top: 40px;">
        <p onclick="resetGame()" style="color: #ff4d4d; font-size: 0.7rem; text-decoration: underline; cursor: pointer; opacity: 0.5;">RESET PROGRESS</p>
    </div>

    <!-- CREDIT AZFAR 1A3 -->
    <div style="margin-top: 30px; padding-bottom: 10px; opacity: 0.4; font-size: 0.65rem; letter-spacing: 1px; text-transform: uppercase;">
        Developed by <span style="font-weight: bold; color: #00ecff;">Azfar 1A3</span>
    </div>
</div>

<audio id="bgMusic" src="bg-low.mp3" loop preload="auto">
<audio id="sfxClick" src="Click.mp3" preload="auto">

<script src="script.js"></script>
</body>
</html>
